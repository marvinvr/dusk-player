name: Dusk
options:
  bundleIdPrefix: com.dusk-player
  deploymentTarget:
    iOS: "18.0"
    tvOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  fileTypes:
    icon: folder.iconcomposer.icon

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Dusk:
    type: application
    platform: iOS
    sources:
      - path: Dusk/Sources
      - path: Dusk/Resources
        buildPhase: resources
        excludes:
          - LaunchScreen-tvOS.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dusk-player.app
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Dusk/Support/Info-iOS.plist
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: DuskIcon
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - framework: Frameworks/VLCKit.xcframework
        embed: true

  Dusk-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Dusk/Sources
      - path: Dusk/Resources
        buildPhase: resources
        excludes:
          - DuskIcon.icon
          - LaunchScreen.storyboard
          - LaunchScreen-tvOS.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dusk-player.app
        PRODUCT_NAME: Dusk
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UILaunchScreen_UIColorName: LaunchBackground
        INFOPLIST_KEY_UILaunchScreen_UIImageName: LaunchLogo
        INFOPLIST_KEY_UILaunchScreen_UIImageRespectsSafeAreaInsets: false
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconTV
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - framework: Frameworks/VLCKit-tvOS.xcframework
        embed: true
