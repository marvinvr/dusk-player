name: Dusk
options:
  bundleIdPrefix: com.dusk-player
  deploymentTarget:
    iOS: "17.0"
    tvOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Dusk:
    type: application
    platform: iOS
    sources:
      - path: Dusk/Sources
      - path: Dusk/Resources
        buildPhase: resources
        excludes:
          - LaunchScreen-tvOS.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dusk-player.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: true
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Dusk uses your local network to connect to Plex servers on your Wi-Fi."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconPrimary
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - framework: Frameworks/MobileVLCKit.xcframework
        embed: true

  Dusk-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Dusk/Sources
      - path: Dusk/Resources
        buildPhase: resources
        excludes:
          - LaunchScreen.storyboard
          - LaunchScreen-tvOS.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dusk-player.app
        PRODUCT_NAME: Dusk
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UILaunchScreen_UIColorName: LaunchBackground
        INFOPLIST_KEY_UILaunchScreen_UIImageName: LaunchLogo
        INFOPLIST_KEY_UILaunchScreen_UIImageRespectsSafeAreaInsets: false
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconTV
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
